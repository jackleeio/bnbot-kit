<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BNBot</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-soft: #f4f4f5;
        --bg-card: #f9fafb;
        --border: #e5e7eb;
        --text: #18181b;
        --text-mute: #71717a;
        --green: #22c55e;
        --gray: #9ca3af;
        --link: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --bg-soft: #18181b;
          --bg-card: #1f1f23;
          --border: #27272a;
          --text: #fafafa;
          --text-mute: #a1a1aa;
          --link: #60a5fa;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        width: 320px;
        font-size: 13px;
      }
      #root { padding: 16px; }
      @keyframes bnbot-breathe {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./popup.tsx"></script>
  </body>
</html>
